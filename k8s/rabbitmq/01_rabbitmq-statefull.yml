apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq-dep
  namespace: marketmandu-ns
spec:
  serviceName: "rabbitmq-svc"
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-dep
  template:
    metadata:
      labels:
        app: rabbitmq-dep
    spec:
      containers:
        - name: rabbitmq-dep
          image: rabbitmq:3.13-management
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          envFrom:
            - configMapRef:
                name: mm-rabbitmq-config
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                configMapKeyRef:
                  name: mm-rabbitmq-config
                  key: RABBITMQ_DEFAULT_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                configMapKeyRef:
                  name: mm-rabbitmq-config
                  key: RABBITMQ_DEFAULT_PASS
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
            - name: config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
            - name: plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
        - name: config
          configMap:
            name: mm-rabbitmq-config
            items:
              - key: rabbitmq.conf
                path: rabbitmq.conf
        - name: plugins
          configMap:
            name: mm-rabbitmq-config
            items:
              - key: enabled_plugins
                path: enabled_plugins