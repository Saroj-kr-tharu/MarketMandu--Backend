# Headless — for stable pod DNS
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: marketmandu-ns
spec:
  clusterIP: None
  selector:
    app: redis-dep
  ports:
    - name: redis
      port: 6379
---
# Internal ClusterIP 
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: marketmandu-ns
spec:
  type: ClusterIP
  selector:
    app: redis-dep
  ports:
    - name: redis
      port: 6379
      targetPort: 6379