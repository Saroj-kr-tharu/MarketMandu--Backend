apiVersion: v1
kind: ConfigMap
metadata:
  name: mm-redis-config
  namespace: marketmandu-ns
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    protected-mode no

    # Password (also set in env, this is for config file auth)
    requirepass StrongPassword123

    # Persistence — RDB snapshot
    save 900 1
    save 300 10
    save 60 10000

    # Persistence — AOF (more durable)
    appendonly yes
    appendfsync everysec

    # Memory
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # Logging
    loglevel notice

    # Slow log
    slowlog-log-slower-than 10000
    slowlog-max-len 128



  

  




  


